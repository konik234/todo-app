<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 520px;
        }

        h1 {
            color: #fff;
            font-size: 2.2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 28px;
        }

        .input-row input {
            flex: 1;
            padding: 14px 18px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: background 0.2s;
        }

        .input-row input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .input-row input:focus {
            background: rgba(255, 255, 255, 0.18);
        }

        .input-row button {
            padding: 14px 22px;
            border: none;
            border-radius: 12px;
            background: #6c5ce7;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .input-row button:hover {
            background: #7d6ff0;
        }

        .input-row button:active {
            transform: scale(0.96);
        }

        .filters {
            display: flex;
            gap: 6px;
            margin-bottom: 18px;
        }

        .filters button {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.07);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filters button.active {
            background: rgba(108, 92, 231, 0.4);
            color: #fff;
        }

        .filters button:hover:not(.active) {
            background: rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.8);
        }

        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 18px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            animation: slideIn 0.25s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-item.removing {
            animation: slideOut 0.25s ease-in forwards;
        }

        @keyframes slideOut {
            to { opacity: 0; transform: translateX(30px); }
        }

        .checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .checkbox:hover {
            border-color: #6c5ce7;
        }

        .checkbox.checked {
            background: #6c5ce7;
            border-color: #6c5ce7;
        }

        .checkbox.checked::after {
            content: '';
            width: 6px;
            height: 10px;
            border: solid #fff;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg) translate(-1px, -1px);
        }

        .task-text {
            flex: 1;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.2s;
            word-break: break-word;
        }

        .task-item.done .task-text {
            text-decoration: line-through;
            color: rgba(255, 255, 255, 0.35);
        }

        .delete-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: rgba(255, 255, 255, 0.25);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .delete-btn:hover {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
        }

        .empty-state {
            text-align: center;
            color: rgba(255, 255, 255, 0.25);
            padding: 40px 0;
            font-size: 0.95rem;
        }

        .counter {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Todo List</h1>

        <div class="input-row">
            <input type="text" id="taskInput" placeholder="Dodaj nowe zadanie..." autofocus>
            <button onclick="addTask()">Dodaj</button>
        </div>

        <div class="filters">
            <button class="active" onclick="setFilter('all', this)">Wszystkie</button>
            <button onclick="setFilter('active', this)">Aktywne</button>
            <button onclick="setFilter('done', this)">Zrobione</button>
        </div>

        <ul class="task-list" id="taskList"></ul>
        <div class="counter" id="counter"></div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('todos') || '[]');
        let filter = 'all';

        const input = document.getElementById('taskInput');
        const list = document.getElementById('taskList');
        const counter = document.getElementById('counter');

        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') addTask();
        });

        function save() {
            localStorage.setItem('todos', JSON.stringify(tasks));
        }

        function addTask() {
            const text = input.value.trim();
            if (!text) return;
            tasks.push({ id: Date.now(), text, done: false });
            input.value = '';
            save();
            render();
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) task.done = !task.done;
            save();
            render();
        }

        function deleteTask(id) {
            const el = document.querySelector(`[data-id="${id}"]`);
            if (el) {
                el.classList.add('removing');
                setTimeout(() => {
                    tasks = tasks.filter(t => t.id !== id);
                    save();
                    render();
                }, 250);
            }
        }

        function setFilter(f, btn) {
            filter = f;
            document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function render() {
            const filtered = tasks.filter(t => {
                if (filter === 'active') return !t.done;
                if (filter === 'done') return t.done;
                return true;
            });

            if (filtered.length === 0) {
                list.innerHTML = `<div class="empty-state">${
                    tasks.length === 0 ? 'Brak zadań — dodaj coś!' : 'Brak zadań w tej kategorii'
                }</div>`;
            } else {
                list.innerHTML = filtered.map(t => `
                    <li class="task-item${t.done ? ' done' : ''}" data-id="${t.id}">
                        <div class="checkbox${t.done ? ' checked' : ''}" onclick="toggleTask(${t.id})"></div>
                        <span class="task-text">${escapeHtml(t.text)}</span>
                        <button class="delete-btn" onclick="deleteTask(${t.id})" title="Usuń">&times;</button>
                    </li>
                `).join('');
            }

            const active = tasks.filter(t => !t.done).length;
            const done = tasks.filter(t => t.done).length;
            counter.textContent = tasks.length
                ? `${active} do zrobienia · ${done} zrobionych`
                : '';
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        render();
    </script>
</body>
</html>
